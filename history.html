<!DOCTYPE html>
<html lang="en" ng-app="expenseApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History - Expense Tracker</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/service.js"></script>
    <script src="js/controller.js"></script>
</head>

<body ng-controller="HistoryController">

    <div id="navbar">
        <div class="logo">
            💰 Expense Tracker
        </div>
        <div style="float: right; padding: 20px; color: gold;">
            <span>Welcome, <strong>{{currentUser}}</strong> | </span>
            <a href="#" ng-click="logout()" style="color: gold; cursor: pointer; text-decoration: none;">Logout</a>
        </div>
    </div>

    <div class="sidebar">
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="add.html">➕ Add Transaction</a>
        <a href="history.html" class="active">📜 History</a>
    </div>

    <div class="main">

        <h1 class="heading">
            Transaction History
        </h1>

        <input type="text"
               placeholder="🔍 Search by category or type..."
               ng-model="searchText"
               class="search-box">

        <br><br>

        <table ng-show="transactions.length > 0">

            <tr>
                <th>Type</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Date</th>
            </tr>

            <tr ng-repeat="t in transactions | filter:searchText" 
                ng-class="{income: t.type == 'Income', expense: t.type == 'Expense'}">

                <td>{{t.type}}</td>
                <td>{{t.category}}</td>
                <td>₹{{t.amount}}</td>
                <td>{{t.date}}</td>

            </tr>

        </table>

        <div ng-show="transactions.length == 0" style="text-align: center; color: gold; padding: 50px;">
            <h3>No transactions yet. Start by adding one!</h3>
        </div>

    </div>

</body>
</html>
